name: 📋 タスク
description: 実装する機能やTODOを管理する
title: "[Task]: "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        開発タスクを管理します。実装する内容を記載してください。
  
  - type: dropdown
    id: scope
    attributes:
      label: 変更範囲
      description: どの部分の作業ですか？
      options:
        - ui (フロントエンド)
        - backend (サーバーサイド)
        - db (データベース)
        - api (API)
        - docs (ドキュメント)
        - その他
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: タスクの内容
      description: 実装する内容を記載してください
      placeholder: 実装する機能や作業の内容を記載してください
    validations:
      required: true
  
  - type: textarea
    id: checklist
    attributes:
      label: 実装内容
      description: 具体的な作業内容をチェックリスト形式で記載してください
      placeholder: |
        - [ ] ～を実装
        - [ ] ～を追加
        - [ ] ～をテスト
      value: |
        - [ ] 
    validations:
      required: false
  
  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      description: どの程度重要ですか？
      options:
        - 高 (早急に必要)
        - 中 (通常)
        - 低 (余裕があれば)
    validations:
      required: true
  
  - type: dropdown
    id: size
    attributes:
      label: 作業量の目安
      description: どのくらいの規模ですか？
      options:
        - XS (30分以内)
        - S (1-2時間)
        - M (半日程度)
        - L (1日程度)
        - XL (2日以上)
    validations:
      required: false
  
  - type: textarea
    id: notes
    attributes:
      label: 実装メモ
      description: 実装時の注意点や参考情報があれば記載してください
      placeholder: 実装時に注意すべき点や参考リンクなどを記載してください
    validations:
      required: false
  
  - type: textarea
    id: related
    attributes:
      label: 関連Issue
      description: 関連するIssueがあれば記載してください
      placeholder: "#123, #456"
    validations:
      required: false

